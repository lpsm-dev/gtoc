---
name: Manual - Release
on:
  workflow_dispatch:
permissions: {}
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    if: ${{ github.ref == 'refs/heads/main' }}
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      # Persisted credentials are required here: semantic-release pushes
      # the changelog commit and the release tag back to main.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # zizmor: ignore[artipacked] v7
        with:
          fetch-depth: 0
      # Node cache does not feed the published artifact: goreleaser builds
      # from git-tracked Go sources only.
      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # zizmor: ignore[cache-poisoning] v7
        with:
          node-version: "lts/*"
      # Throwaway release tooling, majors pinned; not part of the artifact.
      - name: Install semantic-release
        run: |  # zizmor: ignore[adhoc-packages]
          # Local install: semantic-release resolves plugins from
          # ./node_modules; isolated global packages are not resolvable.
          npm install --no-save --no-package-lock \
            semantic-release@24 \
            @semantic-release/changelog@6 \
            @semantic-release/commit-analyzer@13 \
            @semantic-release/release-notes-generator@14 \
            @semantic-release/git@10 \
            conventional-changelog-conventionalcommits@8
      - name: Compute next version, changelog and tag
        run: npx --no-install semantic-release --extends ./.github/config/.releaserc.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Tags pushed with GITHUB_TOKEN do not trigger the tag-push workflow
      # (GitHub blocks workflow chaining), so goreleaser runs here when
      # semantic-release created a release tag on HEAD.
      - name: Detect released tag
        id: tag
        run: |
          echo "tag=$(git describe --exact-match --tags HEAD 2>/dev/null || true)" \
            >> "$GITHUB_OUTPUT"
      - name: Set up Go
        if: steps.tag.outputs.tag != ''
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7
        with:
          go-version-file: go.mod
          # No cache restore in the artifact-publishing path (cache poisoning)
          cache: false
      - name: Run GoReleaser
        if: steps.tag.outputs.tag != ''
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
